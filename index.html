<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>会员中心</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="header">
  <div>⚙</div>
  <div class="title">会员中心</div>
  <div>⋮</div>
</div>

<div class="notice">
  📢 接单之前请先查看教程，订单问题联系在线售后
</div>

<div class="games">
  <button class="active">三角洲</button>
  <button>地铁</button>
  <button>吃鸡</button>
  <button>装备</button>
  <button>暗区</button>
</div>

<div class="tabs">
  <span class="active">全部</span>
  <span>手游</span>
  <span>端游</span>
  <span>精选商家</span>
</div>

<div class="live">
  🔥 1秒前 用户604607 抢单赚了1.46元
</div>

<div class="card">
  <div class="card-top">
    <div>
      <h3>绝密568W</h3>
      <p>【手游】</p>
      <p>1.主页截图</p>
      <p>2.组队截图</p>
      <p>3.收益截图</p>
    </div>

    <div class="price">
      RM46
    </div>
  </div>

  <div class="merchant">
    <img src="https://via.placeholder.com/45">
    <div>
      <h4>青竹直营店</h4>
      <p>⭐⭐⭐⭐☆ 4.0</p>
      <div class="tags">
        <span>金牌商家</span>
        <span>优质商家</span>
        <span>直营店</span>
      </div>
    </div>
  </div>

  <button class="grab-btn">
    立即抢单
  </button>
</div>

<nav class="bottom">
  <a class="on">🏠<br>首页</a>
  <a>📋<br>订单</a>
  <a>👤<br>我的</a>
</nav>

<script src="js/app.js"></script>

</body>
</html>
