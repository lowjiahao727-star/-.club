<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>登录</title>

<style>
body{
    margin:0;
    font-family:Arial;
    background:#f5f5f5;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.box{
    width:85%;
    background:#fff;
    padding:20px;
    border-radius:12px;
}

input{
    width:100%;
    padding:12px;
    margin-top:10px;
    border:1px solid #ddd;
    border-radius:8px;
}

button{
    width:100%;
    padding:12px;
    margin-top:15px;
    border:none;
    border-radius:8px;
    background:#2196f3;
    color:#fff;
    font-size:16px;
}
</style>
</head>

<body>

<div class="box">
    <h3>用户登录 / 注册</h3>

    <input id="email" placeholder="邮箱">
    <input id="password" type="password" placeholder="密码">

    <button onclick="register()">注册</button>
    <button onclick="login()">登录</button>
</div>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyBA0HrFRvLYOHI9CkEkBWnuRgQYnwc473E",
  authDomain: "jiahao-18d51.firebaseapp.com",
  projectId: "jiahao-18d51",
  storageBucket: "jiahao-18d51.firebasestorage.app",
  messagingSenderId: "163347475605",
  appId: "1:163347475605:web:6e67390b4a0ce8bb02bf9c"
};

firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();

// 注册
function register(){
    let email = document.getElementById("email").value;
    let password = document.getElementById("password").value;

    auth.createUserWithEmailAndPassword(email, password)
    .then(()=> alert("注册成功"))
    .catch(e=> alert(e.message));
}

// 登录
function login(){
    let email = document.getElementById("email").value;
    let password = document.getElementById("password").value;

    auth.signInWithEmailAndPassword(email, password)
    .then(()=>{
        alert("登录成功");
        location.href="index.html";
    })
    .catch(e=> alert(e.message));
}
</script>

</body>
</html>
